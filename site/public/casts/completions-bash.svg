<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="824" height="262" viewBox="0 0 824 262" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">
<rect x="0" y="0" width="824" height="262" rx="10" fill="#1a1a1d"/>
<rect x="0" y="0" width="824" height="28" rx="10" fill="#2a2a2f"/>
<rect x="0" y="22" width="824" height="6" fill="#2a2a2f"/>
<circle cx="14.0" cy="14.0" r="6" fill="#ff605c"/>
<circle cx="32.0" cy="14.0" r="6" fill="#ffbd44"/>
<circle cx="50.0" cy="14.0" r="6" fill="#00ca4e"/>
<text x="412.0" y="19.0" text-anchor="middle" fill="#9aa6b2">glacier completions bash</text>
<g transform="translate(12,46)">
<text x="0" y="18.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#5fffff" font-weight="bold">ʕ•ᴥ•ʔ</tspan><tspan x="40.0" fill="#dde6ee"> </tspan><tspan x="48.0" fill="#5fffff">glacier completions</tspan></text>
<text x="0" y="36.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee"># glacier bash completion</tspan></text>
<text x="0" y="54.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">_glacier_completions() {</tspan></text>
<text x="0" y="72.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">    local cur=&quot;${COMP_WORDS[COMP_CWORD]}&quot;</tspan></text>
<text x="0" y="90.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">    local commands=&quot;vibe version generate lint test init new completions explain&quot;</tspan></text>
<text x="0" y="108.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">    if [[ ${COMP_CWORD} -eq 1 ]]; then</tspan></text>
<text x="0" y="126.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">        COMPREPLY=($(compgen -W &quot;${commands}&quot; -- &quot;${cur}&quot;))</tspan></text>
<text x="0" y="144.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">    fi</tspan></text>
<text x="0" y="162.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">}</tspan></text>
<text x="0" y="180.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">complete -F _glacier_completions glacier</tspan></text>
</g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="744" height="460" viewBox="0 0 744 460" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">
<rect x="0" y="0" width="744" height="460" rx="10" fill="#1a1a1d"/>
<rect x="0" y="0" width="744" height="28" rx="10" fill="#2a2a2f"/>
<rect x="0" y="22" width="744" height="6" fill="#2a2a2f"/>
<circle cx="14.0" cy="14.0" r="6" fill="#ff605c"/>
<circle cx="32.0" cy="14.0" r="6" fill="#ffbd44"/>
<circle cx="50.0" cy="14.0" r="6" fill="#00ca4e"/>
<text x="372.0" y="19.0" text-anchor="middle" fill="#9aa6b2">glacier vibe --help</text>
<g transform="translate(12,46)">
<text x="0" y="18.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee" font-weight="bold">SYNOPSIS</tspan></text>
<text x="0" y="36.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  glacier vibe [flags]</tspan></text>
<text x="0" y="54.0" fill="#dde6ee" xml:space="preserve"></text>
<text x="0" y="72.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  Animated bear + tip rotation; ambient framework reference.</tspan></text>
<text x="0" y="90.0" fill="#dde6ee" xml:space="preserve"></text>
<text x="0" y="108.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee" font-weight="bold">DESCRIPTION</tspan></text>
<text x="0" y="126.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  Plays an animated polar bear with the Glacier wordmark and a</tspan></text>
<text x="0" y="144.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  rotating tip from the framework's documentation. Press any key to</tspan></text>
<text x="0" y="162.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  exit.</tspan></text>
<text x="0" y="180.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  </tspan></text>
<text x="0" y="198.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  Use --ascii on terminals without UTF-8 or color support;</tspan></text>
<text x="0" y="216.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  use --duration to bound the animation; use --no-tips to suppress</tspan></text>
<text x="0" y="234.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  the tip footer.</tspan></text>
<text x="0" y="252.0" fill="#dde6ee" xml:space="preserve"></text>
<text x="0" y="270.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee" font-weight="bold">FLAGS</tspan></text>
<text x="0" y="288.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  </tspan><tspan x="16.0" fill="#e3c46e">    --ascii</tspan><tspan x="104.0" fill="#dde6ee">           Forces the kaomoji-only fallback even on capable terminals</tspan></text>
<text x="0" y="306.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  </tspan><tspan x="16.0" fill="#e3c46e">    --duration &lt;int&gt;</tspan><tspan x="176.0" fill="#dde6ee">  Bounds the loop. Default 0s means run until key press or SIGINT</tspan></text>
<text x="0" y="324.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  </tspan><tspan x="16.0" fill="#e3c46e">    --notips</tspan><tspan x="112.0" fill="#dde6ee">          Suppresses the rotating tip line</tspan></text>
<text x="0" y="342.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">  </tspan><tspan x="16.0" fill="#e3c46e">    --seed &lt;int&gt;</tspan><tspan x="144.0" fill="#dde6ee">      Seeds the tip-rotation order. 0 means time-based</tspan></text>
<text x="0" y="360.0" fill="#dde6ee" xml:space="preserve"></text>
<text x="0" y="378.0" fill="#dde6ee" xml:space="preserve"><tspan x="0.0" fill="#dde6ee">Run </tspan><tspan x="32.0" fill="#dde6ee" text-decoration="underline">glacier --help</tspan><tspan x="144.0" fill="#dde6ee"> for global flags.</tspan></text>
</g>
</svg>

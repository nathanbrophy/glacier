<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Glacier companion bear, thinking">
  <title>Glacier companion bear thinking</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FBFC"/>
      <stop offset="1" stop-color="#E6EDF3"/>
    </linearGradient>
  </defs>

  <!-- Body -->
  <rect x="22" y="50" width="52" height="34" rx="14" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>

  <!-- Standing legs -->
  <rect x="28" y="74" width="12" height="14" rx="4" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
  <rect x="56" y="74" width="12" height="14" rx="4" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>

  <!-- Head + paw, tilted slightly to the right (whole group rotates ~6deg) -->
  <g transform="rotate(6 48 36)">
    <!-- Ears -->
    <circle cx="30" cy="22" r="8" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
    <circle cx="66" cy="22" r="8" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
    <circle cx="30" cy="22" r="3.5" fill="#22D3EE" opacity="0.6"/>
    <circle cx="66" cy="22" r="3.5" fill="#22D3EE" opacity="0.6"/>

    <!-- Head -->
    <ellipse cx="48" cy="34" rx="22" ry="20" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>

    <!-- Snout -->
    <ellipse cx="48" cy="42" rx="10" ry="7" fill="#FFFFFF" stroke="#0E1116" stroke-width="1.5"/>

    <!-- Eyes - looking up-right (offset pupils for thinking gaze) -->
    <circle cx="40" cy="32" r="2.6" fill="#0E1116"/>
    <circle cx="56" cy="32" r="2.6" fill="#0E1116"/>
    <circle cx="41.2" cy="31.0" r="0.8" fill="#FFFFFF"/>
    <circle cx="57.2" cy="31.0" r="0.8" fill="#FFFFFF"/>

    <!-- Nose -->
    <ellipse cx="48" cy="40" rx="2.2" ry="1.7" fill="#0E1116"/>

    <!-- Pursed mouth (small line, contemplative) -->
    <path d="M 45 46 Q 48 47 51 46" stroke="#0E1116" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Paw at chin (rotated up from right shoulder) -->
  <g transform="rotate(-50 70 56)">
    <rect x="64" y="42" width="11" height="20" rx="5" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
    <circle cx="69.5" cy="42" r="4.5" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
  </g>
</svg>

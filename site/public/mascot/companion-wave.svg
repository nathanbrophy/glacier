<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Glacier companion bear, waving">
  <title>Glacier companion bear waving</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FBFC"/>
      <stop offset="1" stop-color="#E6EDF3"/>
    </linearGradient>
  </defs>

  <!-- Body -->
  <rect x="22" y="50" width="52" height="34" rx="14" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>

  <!-- Front legs (right leg standing, left paw raised waving) -->
  <rect x="56" y="74" width="12" height="14" rx="4" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>

  <!-- Raised waving paw, angled up from shoulder -->
  <g transform="rotate(-32 28 56)">
    <rect x="22" y="42" width="12" height="22" rx="5" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
    <circle cx="28" cy="42" r="4.5" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
  </g>

  <!-- Ears -->
  <circle cx="30" cy="22" r="8" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
  <circle cx="66" cy="22" r="8" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>
  <circle cx="30" cy="22" r="3.5" fill="#22D3EE" opacity="0.6"/>
  <circle cx="66" cy="22" r="3.5" fill="#22D3EE" opacity="0.6"/>

  <!-- Head -->
  <ellipse cx="48" cy="34" rx="22" ry="20" fill="url(#bg)" stroke="#0E1116" stroke-width="2"/>

  <!-- Snout -->
  <ellipse cx="48" cy="42" rx="10" ry="7" fill="#FFFFFF" stroke="#0E1116" stroke-width="1.5"/>

  <!-- Eyes (slightly happier, closed-arc smile-eyes) -->
  <path d="M 37 32 Q 40 29 43 32" stroke="#0E1116" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 53 32 Q 56 29 59 32" stroke="#0E1116" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="48" cy="40" rx="2.2" ry="1.7" fill="#0E1116"/>

  <!-- Open smile -->
  <path d="M 43 45 Q 48 50 53 45" stroke="#0E1116" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
